name: Update and deploy intelligence center

on:
  push:
    branches:
      - main
  schedule:
    # 07:10 Asia/Shanghai every day.
    - cron: "10 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update intelligence data
        if: github.event_name != 'push'
        run: npm run update:daily

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/intelligence.json
          git commit -m "chore: update intelligence data" || echo "No intelligence data changes"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build GitHub Pages site
        env:
          BUILD_TARGET: github-pages
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build:pages

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
